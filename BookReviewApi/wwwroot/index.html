<!DOCTYPE html>
<html>
<head>
    <title>Book Review API</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        input, button {
            margin: 5px;
            padding: 8px;
        }

        .book {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>

<body>

<h1>📚 Book Review Frontend</h1>

<h2>Add Book</h2>
<input id="title" placeholder="Title">
<input id="author" placeholder="Author">
<button onclick="addBook()">Add Book</button>

<h2>Books</h2>
<button onclick="loadBooks()">Load Books</button>

<div id="books"></div>

<script>
const apiUrl = "https://localhost:7041/api/books"; // CHANGE PORT IF NEEDED

async function addBook() {
    const book = {
        title: document.getElementById("title").value,
        author: document.getElementById("author").value,
        publishedYear: 2024,
        description: "Added from frontend"
    };

    await fetch(apiUrl, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(book)
    });

    loadBooks();
}

async function loadBooks() {
    const res = await fetch(apiUrl);
    const data = await res.json();

    const container = document.getElementById("books");
    container.innerHTML = "";

    data.forEach(book => {
        container.innerHTML += `
            <div class="book">
                <h3>${book.title}</h3>
                <p>${book.author}</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
